name: build-native-shell

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NATIVE_RELEASE_REMOTE_URL: https://dingdongbro.272.chat/

permissions:
  contents: read

jobs:
  verify:
    name: Verify shell project
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run shell tests
        run: bun test

  desktop:
    name: Desktop ${{ matrix.os }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> src-tauri/target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop shell
        run: bun run build:desktop

      - name: Package portable Windows desktop executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $portableOutputDir = "build/portable"
          New-Item -ItemType Directory -Force -Path $portableOutputDir | Out-Null

          $desktopExecutable = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" -File | Select-Object -First 1
          if (-not $desktopExecutable) {
            throw "Could not find the built Windows desktop executable in src-tauri/target/release."
          }

          $portableArchivePath = Join-Path $portableOutputDir "dingdongbro-desktop-windows-latest-portable.7z"
          & 7z a -t7z -mx=9 $portableArchivePath $desktopExecutable.FullName

          if ($LASTEXITCODE -ne 0) {
            throw "7z failed to create the portable Windows archive."
          }

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dingdongbro-desktop-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*
            build/portable/**/*.7z
          if-no-files-found: error

  android:
    name: Android (signed)
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    env:
      NDK_VERSION: 27.0.12077973
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
      ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: false
          log-accepted-android-sdk-licenses: false

      - name: Validate Android signing secrets
        shell: bash
        run: |
          for secret_name in ANDROID_RELEASE_KEYSTORE_BASE64 ANDROID_RELEASE_KEYSTORE_PASSWORD ANDROID_RELEASE_KEY_ALIAS; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required GitHub secret: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Accept Android licenses
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK components
        shell: bash
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;${NDK_VERSION}"

      - name: Export Android paths
        shell: bash
        run: |
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install Rust stable with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> src-tauri/target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure Android project scaffold
        run: bun run package:mobile android

      - name: Restore Gradle cache
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            src-tauri/gen/android/**/*.gradle*
            src-tauri/gen/android/**/gradle-wrapper.properties
            src-tauri/gen/android/**/gradle.properties
            src-tauri/gen/android/**/gradle/libs.versions.toml

      # This job uses an upload keystore provided through GitHub secrets, not the Play App Signing key.
      - name: Build Android shell
        run: bun run package:mobile:android

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dingdongbro-android
          path: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          if-no-files-found: error

  ios:
    name: iOS (unsigned)
    needs: verify
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install Rust stable with iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> src-tauri/target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start Tauri iOS bridge
        shell: bash
        run: |
          bun run open:mobile:ios > /tmp/tauri-ios-open.log 2>&1 &
          echo "TAURI_IOS_OPEN_PID=$!" >> "$GITHUB_ENV"

          IOS_IDENTIFIER="$(bun -e 'console.log(JSON.parse(await Bun.file("src-tauri/tauri.conf.json").text()).identifier)')"
          ADDR_FILE="${TMPDIR}${IOS_IDENTIFIER}-server-addr"

          for _ in {1..60}; do
            if [ -f "$ADDR_FILE" ]; then
              echo "TAURI_IOS_ADDR_FILE=$ADDR_FILE" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 2
          done

          echo "Timed out waiting for Tauri iOS bridge at $ADDR_FILE" >&2
          cat /tmp/tauri-ios-open.log >&2 || true
          exit 1

      - name: Build unsigned iOS archive
        shell: bash
        run: |
          XCODE_PROJECT="$(find src-tauri/gen/apple -maxdepth 1 -name '*.xcodeproj' | head -n 1)"
          if [ -z "$XCODE_PROJECT" ]; then
            echo "Missing generated Xcode project under src-tauri/gen/apple" >&2
            exit 1
          fi

          APP_NAME="$(basename "$XCODE_PROJECT" .xcodeproj)"
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "${APP_NAME}_iOS" \
            -archivePath "src-tauri/gen/apple/build/${APP_NAME}.xcarchive" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Show Tauri iOS bridge log on failure
        if: failure()
        shell: bash
        run: cat /tmp/tauri-ios-open.log || true

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dingdongbro-ios
          path: |
            src-tauri/gen/apple/build/**/*.xcarchive
            src-tauri/gen/apple/build/**/*.app
          if-no-files-found: error

      - name: Stop Tauri iOS bridge
        if: always()
        shell: bash
        run: |
          if [ -n "${TAURI_IOS_OPEN_PID:-}" ]; then
            kill "$TAURI_IOS_OPEN_PID" || true
          fi
